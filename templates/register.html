<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#f5f5f5;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:360px;
background:white;
padding:40px;
border:1px solid #e5e5e5;
}

h2{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:16px;
border:1px solid #ddd;
font-size:14px;
}

input:focus{
outline:none;
border-color:#000;
}

button{
width:100%;
padding:12px;
background:#000;
color:white;
border:none;
font-size:14px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

p{
margin-top:18px;
font-size:13px;
color:#666;
}

a{
color:#000;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input id="user" placeholder="Username" oninput="checkForm()">
<input id="phone" placeholder="Phone Number" oninput="checkForm()" maxlength="10">
<input id="pass" type="password" placeholder="Password" oninput="checkForm()">
<input id="company_pass" type="password" placeholder="Company Password" oninput="checkForm()">

<button id="registerBtn" onclick="register()" disabled>Register</button>

<p>
<a href="/login">Back to login</a>
</p>

</div>

<script>


function checkForm(){
let username=document.getElementById("user").value.trim()
let phone=document.getElementById("phone").value.trim()
let password=document.getElementById("pass").value.trim()
let company_password=document.getElementById("company_pass").value.trim()

let btn=document.getElementById("registerBtn")
let phoneInput=document.getElementById("phone")

// 📱 Phone validation: exactly 10 digits
let phoneValid = /^[0-9]{10}$/.test(phone)

// 🔴 Highlight invalid phone
if(phone && !phoneValid){
    phoneInput.style.borderColor = "red"
}else{
    phoneInput.style.borderColor = "#ddd"
}

// ✅ Enable/disable button
if(username && password && company_password && phoneValid){
    btn.disabled=false
}else{
    btn.disabled=true
}
}


async function register(){

let username=document.getElementById("user").value
let phone=document.getElementById("phone").value
let password=document.getElementById("pass").value
let company_password=document.getElementById("company_pass").value

let r=await fetch("/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,phone,password,company_password})
})

let data=await r.json()

if(data.message){
alert("Account created")
location="/login"
}else{
alert(data.error)
}

}


</script>

</body>
</html>
