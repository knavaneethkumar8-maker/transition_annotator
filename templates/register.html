<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#f5f5f5;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:360px;
background:white;
padding:40px;
border:1px solid #e5e5e5;
}

h2{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.input-group {
    margin-bottom: 4px;
    position: relative;
}

.input-wrapper {
    position: relative;
    margin-bottom: 4px;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
font-size:14px;
}

.password-input {
    padding-right: 95px;
}

.show-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    padding: 4px 8px;
    width: auto;
    font-weight: normal;
}

.show-btn:hover {
    color: #000;
    background: none;
    opacity: 1;
}

input:focus{
outline:none;
border-color:#000;
}

button{
width:100%;
padding:12px;
background:#000;
color:white;
border:none;
font-size:14px;
cursor:pointer;
margin-top: 8px;
}

button:hover{
opacity:0.9;
}

p{
margin-top:18px;
font-size:13px;
color:#666;
text-align: center;
}

a{
color:#000;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.validation-message {
    font-size: 11px;
    margin-top: 2px;
    margin-bottom: 12px;
    padding-left: 4px;
    min-height: 28px;
    line-height: 1.3;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<div class="input-group">
    <input id="user" placeholder="Username" oninput="checkForm()">
    <div id="usernameMsg" class="validation-message"></div>
</div>

<div class="input-group">
    <div class="input-wrapper">
        <input id="pass" type="password" placeholder="Password" class="password-input" oninput="checkForm()">
        <button type="button" class="show-btn" onclick="togglePassword('pass', this)">Show</button>
    </div>
    <div id="passMsg" class="validation-message"></div>
</div>

<div class="input-group">
    <div class="input-wrapper">
        <input id="company_pass" type="password" placeholder="Company Password" class="password-input" oninput="checkForm()">
        <button type="button" class="show-btn" onclick="togglePassword('company_pass', this)">Show</button>
    </div>
    <div id="companyPassMsg" class="validation-message"></div>
</div>

<div class="input-group">
    <input id="phone" placeholder="Phone Number" oninput="checkForm()" maxlength="10">
    <div id="phoneMsg" class="validation-message"></div>
</div>

<button id="registerBtn" onclick="register()" disabled>Register</button>

<p>
<a href="/login">Back to login</a>
</p>

</div>

<script>

function togglePassword(fieldId, btn) {
    let field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        btn.textContent = "Hide";
    } else {
        field.type = "password";
        btn.textContent = "Show";
    }
}

function checkForm(){
    let usernameRaw = document.getElementById("user").value
    let username = usernameRaw.trim()
    let phone = document.getElementById("phone").value.trim()
    let password = document.getElementById("pass").value.trim()
    let company_password = document.getElementById("company_pass").value.trim()

    let btn = document.getElementById("registerBtn")
    let phoneInput = document.getElementById("phone")
    let usernameInput = document.getElementById("user")
    
    let usernameMsg = document.getElementById("usernameMsg")
    let phoneMsg = document.getElementById("phoneMsg")
    let passMsg = document.getElementById("passMsg")
    let companyPassMsg = document.getElementById("companyPassMsg")

    // Clear password messages (optional, for consistency)
    if(passMsg) passMsg.innerHTML = ""
    if(companyPassMsg) companyPassMsg.innerHTML = ""

    // Phone validation: exactly 10 digits
    let phoneValid = /^[0-9]{10}$/.test(phone)
    
    // Username validation: only letters, numbers, underscore - NO SPACES allowed anywhere
    let usernameValid = /^[a-zA-Z0-9_]+$/.test(username)
    
    // Check if original input contains any spaces
    let hasSpaces = /\s/.test(usernameRaw)
    
    // Username validation message
    if(username === ""){
        usernameMsg.innerHTML = ""
        usernameMsg.style.color = "#d32f2f"
        usernameInput.style.borderColor = "#ddd"
    } else if(hasSpaces){
        usernameMsg.innerHTML = "Username cannot contain spaces anywhere"
        usernameMsg.style.color = "#d32f2f"
        usernameInput.style.borderColor = "red"
    } else if(!usernameValid){
        usernameMsg.innerHTML = "Username: only letters, numbers, and underscore allowed"
        usernameMsg.style.color = "#d32f2f"
        usernameInput.style.borderColor = "red"
    } else {
        usernameMsg.innerHTML = "Username looks good"
        usernameMsg.style.color = "#2e7d32"
        usernameInput.style.borderColor = "#4caf50"
    }
    
    // Phone validation message
    if(phone === ""){
        phoneMsg.innerHTML = ""
        phoneMsg.style.color = "#d32f2f"
        phoneInput.style.borderColor = "#ddd"
    } else if(!phoneValid){
        phoneMsg.innerHTML = "Phone number must be exactly 10 digits"
        phoneMsg.style.color = "#d32f2f"
        phoneInput.style.borderColor = "red"
    } else {
        phoneMsg.innerHTML = "Phone number valid"
        phoneMsg.style.color = "#2e7d32"
        phoneInput.style.borderColor = "#4caf50"
    }
    
    // Update the input field to show trimmed value (remove leading/trailing spaces)
    if(usernameRaw !== username){
        usernameInput.value = username
        // Re-run validation after trimming
        return checkForm()
    }
    
    // Final validation for button enable
    let finalUsernameValid = usernameValid && !hasSpaces && username !== ""
    
    // Enable/disable button: all fields valid and non-empty
    if(username && password && company_password && phoneValid && finalUsernameValid){
        btn.disabled = false
    } else {
        btn.disabled = true
    }
}

async function register(){

let username=document.getElementById("user").value
let phone=document.getElementById("phone").value
let password=document.getElementById("pass").value
let company_password=document.getElementById("company_pass").value

let r=await fetch("/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,phone,password,company_password})
})

let data=await r.json()

if(data.message){
alert("Account created")
location="/login"
}else{
alert(data.error)
}

}

</script>

</body>
</html>
