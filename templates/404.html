<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Page Not Found</title>

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 500px;
        padding: 20px;
    }

    .emoji {
        font-size: 48px;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 64px;
        margin: 0;
        color: #2e6bd5;
        font-weight: 700;
    }

    h2 {
        margin: 10px 0;
        font-size: 20px;
        font-weight: 500;
    }

    p {
        color: #666;
        font-size: 15px;
        margin-top: 10px;
    }

    .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 24px;
        background:  #2e6bd5;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        border: 1px solid  #2e6bd5;
        transition: all 0.2s ease;
    }

    .btn:hover {
        background: #fff;
        color:  #2e6bd5;
    }

    .link {
        display: block;
        margin-top: 12px;
        font-size: 13px;
        color: #888;
        text-decoration: none;
    }

    .link:hover {
        color:  #2e6bd5;
    }

    @media (max-width: 600px) {
        h1 {
            font-size: 48px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="emoji">🧭</div>

    <h1>404</h1>
    <h2>Page not found</h2>

    <p>
        The page you're looking for doesn’t exist or has been moved.
    </p>

    <a href="/career/jobs" class="btn">Browse Jobs</a>
    <a href="/" class="link">Go to Home</a>

</div>

</body>
</html>
